<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Carte</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0e0e0e;
      color:white;
      text-align:center;
    }
    h2{margin:10px 0}

    .zone{
      background:#1b1b1b;
      padding:12px;
      border-radius:14px;
      margin:10px;
    }

    button{
      margin:4px;
      padding:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#2d89ff;
      color:white;
      font-weight:bold;
    }

    input{
      padding:8px;
      border-radius:10px;
      border:none;
      width:70px;
      text-align:center;
      margin:5px;
      font-weight:bold;
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin-top:10px;
    }

    .title{
      font-size:16px;
      font-weight:bold;
      color:#ffcc00;
    }

    .info{
      font-size:14px;
      color:#ccc;
      margin:5px;
    }

    .card{
      width:70px;
      height:100px;
      border-radius:10px;
      background:white;
      cursor:pointer;
      position:relative;
      border:3px solid transparent;
      box-shadow:0 2px 6px rgba(0,0,0,0.7);
      user-select:none;
    }

    .selected{
      border:3px solid gold;
    }

    .top{
      position:absolute;
      top:5px;
      left:6px;
      font-size:16px;
      font-weight:bold;
    }

    .bottom{
      position:absolute;
      bottom:5px;
      right:6px;
      font-size:16px;
      font-weight:bold;
      transform:rotate(180deg);
    }

    .center{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:34px;
      font-weight:bold;
    }

    .red{color:#d00000;}
    .black{color:#000;}

    .cardBack{
      width:70px;
      height:100px;
      border-radius:10px;
      background:linear-gradient(45deg,#0047ab,#001f4d);
      border:3px solid #cfcfcf;
      cursor:pointer;
      position:relative;
      box-shadow:0 2px 6px rgba(0,0,0,0.7);
    }

    .cardBack::after{
      content:"";
      position:absolute;
      top:10px;
      left:10px;
      right:10px;
      bottom:10px;
      border-radius:8px;
      border:2px dashed rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>

<h2>🃏 Mazzo Carte Francesi</h2>

<div class="zone">
  <button onclick="resetGioco()">Reset</button>
  <button onclick="mescolaMazzo()">Mescola</button>
  <button onclick="pesca(1)">Pesca 1</button>
  <input type="number" id="numPesca" min="1" value="2">
  <button onclick="pescaN()">Pesca N</button>
</div>

<div class="zone">
  <div class="title">AZIONI SELEZIONE</div>
  <button onclick="azioneScarta()">Scarta</button>
  <button onclick="azioneMano()">Rimetti in Mano</button>
  <button onclick="azioneMazzoMescola()">Rimetti nel Mazzo (mescola)</button>
  <button onclick="azioneCima()">Rimetti in Cima</button>
  <button onclick="azioneFondo()">Rimetti in Fondo</button>
</div>

<div class="info" id="contatori"></div>
<div class="info" id="selezioneInfo"></div>

<div class="zone">
  <div class="title">PRIMARIA</div>
  <div class="cards" id="primaria"></div>
  <button onclick="mettiPrimaria()">Metti Primaria (da mano)</button>
</div>

<div class="zone">
  <div class="title">SUPPORTI</div>
  <div class="cards" id="supporti"></div>
  <button onclick="mettiSupporto(2)">Supporto 2</button>
  <button onclick="mettiSupporto(3)">Supporto 3</button>
  <button onclick="mettiSupporto(4)">Supporto 4</button>
  <button onclick="mettiSupporto(5)">Supporto 5</button>
