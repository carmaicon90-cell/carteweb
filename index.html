<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mazzo Carte Francesi</title>

<style>
  body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0e0e0e;
    color:white;
    text-align:center;
  }
  h2{margin:10px 0}

  .zone{
    background:#1b1b1b;
    padding:12px;
    border-radius:14px;
    margin:10px;
  }

  button{
    margin:4px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#2d89ff;
    color:white;
    font-weight:bold;
    font-size:14px;
  }

  input{
    padding:8px;
    border-radius:10px;
    border:none;
    width:70px;
    text-align:center;
    margin:5px;
    font-weight:bold;
  }

  .cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:10px;
  }

  .card{
    width:70px;
    height:100px;
    border-radius:10px;
    background:white;
    cursor:pointer;
    position:relative;
    border:3px solid transparent;
    box-shadow:0 2px 6px rgba(0,0,0,0.7);
    transition:0.15s;
    user-select:none;
  }

  .card:hover{transform:scale(1.06)}
  .selected{border:3px solid gold;transform:scale(1.08)}

  .top{
    position:absolute;
    top:5px;
    left:6px;
    font-size:16px;
    font-weight:bold;
  }

  .bottom{
    position:absolute;
    bottom:5px;
    right:6px;
    font-size:16px;
    font-weight:bold;
    transform:rotate(180deg);
  }

  .center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:34px;
    font-weight:bold;
  }

  .red{color:#d00000;}
  .black{color:#000;}

  .cardBack{
    width:70px;
    height:100px;
