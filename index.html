<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Carte</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0e0e0e;
      color:white;
      text-align:center;
    }
    h2{margin:10px 0}

    .zone{
      background:#1b1b1b;
      padding:12px;
      border-radius:14px;
      margin:10px;
    }

    button{
      margin:4px;
      padding:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#2d89ff;
      color:white;
      font-weight:bold;
    }

    input{
      padding:8px;
      border-radius:10px;
      border:none;
      width:70px;
      text-align:center;
      margin:5px;
      font-weight:bold;
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin-top:10px;
    }

    .title{
      font-size:16px;
      font-weight:bold;
      color:#ffcc00;
    }

    .info{
      font-size:14px;
      color:#ccc;
      margin:5px;
    }

    .card{
      width:70px;
      height:100px;
      border-radius:10px;
      background:white;
      cursor:pointer;
      position:relative;
      border:3px solid transparent;
      box-shadow:0 2px 6px rgba(0,0,0,0.7);
      user-select:none;
    }

    .selected{
      border:3px solid gold;
    }

    .top{
      position:absolute;
      top:5px;
      left:6px;
      font-size:14px;
      font-weight:bold;
    }

    .bottom{
      position:absolute;
      bottom:5px;
      right:6px;
      font-size:14px;
      font-weight:bold;
      transform:rotate(180deg);
    }

    .center{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:32px;
      font-weight:bold;
    }

    .red{color:#d00000;}
    .black{color:#000;}

    .cardBack{
      width:70px;
      height:100px;
      border-radius:10px;
      background:linear-gradient(45deg,#0047ab,#001f4d);
      border:3px solid #cfcfcf;
      cursor:pointer;
      position:relative;
      box-shadow:0 2px 6px rgba(0,0,0,0.7);
    }

    .cardBack::after{
      content:"";
      position:absolute;
      top:10px;
      left:10px;
      right:10px;
